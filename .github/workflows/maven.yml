name: Build, Test & Release

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build and test with Maven
      run: mvn -B package --file pom.xml

    - name: Determine version
      id: version
      run: |
        DATE_VERSION=$(date +'%Y.%m.%d')
        # Check if a tag for today already exists and append run number if so
        if git ls-remote --tags origin "refs/tags/${DATE_VERSION}" | grep -q .; then
          echo "tag=${DATE_VERSION}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
        else
          echo "tag=${DATE_VERSION}" >> "$GITHUB_OUTPUT"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.version.outputs.tag }}
        generate_release_notes: true
        files: target/*.jar
